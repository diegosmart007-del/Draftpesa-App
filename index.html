const isRed=p=>p===RED||p===RED_KING;
const isBlack=p=>p===BLACK||p===BLACK_KING;
const isKing=p=>p===RED_KING||p===BLACK_KING;
const belongs=(p,pl)=>pl==="red"?isRed(p):isBlack(p);
const opp=pl=>pl==="red"?"black":"red";

function initBoard(){
  const b=Array(8).fill(null).map(()=>Array(8).fill(EMPTY));
  for(let r=0;r<8;r++)for(let c=0;c<8;c++)
    if((r+c)%2===1){if(r<3)b[r][c]=BLACK;else if(r>4)b[r][c]=RED;}
  return b;
}
function getJumps(board,r,c,pl){
  const piece=board[r][c],flying=isKing(piece);
  const dirs=[];
  if(isRed(piece)||isKing(piece))dirs.push([-1,-1],[-1,1]);
  if(isBlack(piece)||isKing(piece))dirs.push([1,-1],[1,1]);
  const jumps=[];
  for(const[dr,dc]of dirs){
    if(flying){
      let step=1,foe=null;
      while(true){const nr=r+dr*step,nc=c+dc*step;if(nr<0||nr>=8||nc<0||nc>=8)break;const sq=board[nr][nc];if(foe){if(sq!==EMPTY)break;jumps.push({from:[r,c],to:[nr,nc],over:foe});}else{if(sq!==EMPTY){if(!belongs(sq,pl))foe=[nr,nc];else break;}}step++;}
    }else{
      const mr=r+dr,mc=c+dc,lr=r+2*dr,lc=c+2*dc;
      if(lr<0||lr>=8||lc<0||lc>=8)continue;
      if(board[lr][lc]===EMPTY&&board[mr][mc]!==EMPTY&&!belongs(board[mr][mc],pl))jumps.push({from:[r,c],to:[lr,lc],over:[mr,mc]});
    }
  }
  return jumps;
}
function getMoves(board,r,c,pl){
  const piece=board[r][c],flying=isKing(piece);
  const dirs=[];
  if(isRed(piece)||isKing(piece))dirs.push([-1,-1],[-1,1]);
  if(isBlack(piece)||isKing(piece))dirs.push([1,-1],[1,1]);
  const moves=[];
  for(const[dr,dc]of dirs){
    if(flying){let step=1;while(true){const nr=r+dr*step,nc=c+dc*step;if(nr<0||nr>=8||nc<0||nc>=8)break;if(board[nr][nc]!==EMPTY)break;moves.push({from:[r,c],to:[nr,nc],over:null});step++;}}
    else{const nr=r+dr,nc=c+dc;if(nr>=0&&nr<8&&nc>=0&&nc<8&&board[nr][nc]===EMPTY)moves.push({from:[r,c],to:[nr,nc],over:null});}
  }
  return moves;
}
function allJumps(b,pl){const a=[];for(let r=0;r<8;r++)for(let c=0;c<8;c++)if(belongs(b[r][c],pl))a.push(...getJumps(b,r,c,pl));return a;}
function allMoves(b,pl){const j=allJumps(b,pl);if(j.length)return j;const m=[];for(let r=0;r<8;r++)for(let c=0;c<8;c++)if(belongs(b[r][c],pl))m.push(...getMoves(b,r,c,pl));return m;}
function applyMove(board,move){
  const nb=board.map(r=>[...r]);
  const[fr,fc]=move.from,[tr,tc]=move.to;
  nb[tr][tc]=nb[fr][fc];nb[fr][fc]=EMPTY;
  if(move.over){const[or,oc]=move.over;nb[or][oc]=EMPTY;}
  if(nb[tr][tc]===RED&&tr===0)nb[tr][tc]=RED_KING;
  if(nb[tr][tc]===BLACK&&tr===7)nb[tr][tc]=BLACK_KING;
  return nb;
}
function countP(b){let r=0,bl=0;for(let i=0;i<8;i++)for(let j=0;j<8;j++){if(isRed(b[i][j]))r++;if(isBlack(b[i][j]))bl++;}return{red:r,black:bl};}

// AI ENGINE — Minimax with Alpha-Beta Pruning
// ══════════════════════════════════════════════════════════════════════════

// Board evaluation: positive = good for black (AI), negative = good for red
function evalBoard(board){
  let score=0;
  const kingBonus=2.5, backRowBonus=0.5, centerBonus=0.3, advanceBonus=0.1;
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const p=board[r][c];
      if(p===EMPTY) continue;
      let val=1;
      if(isKing(p)) val=kingBonus;
      // Advance bonus — black advances downward (higher rows)
      if(p===BLACK) val+=advanceBonus*r;
      if(p===RED)   val+=advanceBonus*(7-r);
      // Back row protection
      if(p===BLACK&&r===0) val+=backRowBonus;
      if(p===RED&&r===7)   val+=backRowBonus;
      // Center control
      if(c>=2&&c<=5&&r>=2&&r<=5) val+=centerBonus;
      if(isBlack(p)) score+=val; else score-=val;
    }
  }
  return score;
}

// Get all possible multi-jump sequences from a position
function getChainMoves(board,r,c,pl){
  const jumps=getJumps(board,r,c,pl);
  if(jumps.length===0) return [{moves:[],board}];
  const chains=[];
  for(const j of jumps){
    const nb=applyMove(board,j);
    const[tr,tc]=j.to;
    // Check if promoted — stop chain if just became king
    const wasK=isKing(board[r][c]);
    const nowK=isKing(nb[tr][tc]);
    if(!wasK&&nowK){
      chains.push({moves:[j],board:nb}); continue;
    }
    const further=getChainMoves(nb,tr,tc,pl);
    for(const f of further){
      chains.push({moves:[j,...f.moves],board:f.board});
    }
  }
  return chains;
}

// Get all complete move sequences for a player
function getAllSequences(board,pl){
  const jumps=allJumps(board,pl);
  const seqs=[];
  if(jumps.length>0){
    // Must jump — find all chain sequences
    const seen=new Set();
    for(const j of jumps){
      const nb=applyMove(board,j);
      const[tr,tc]=j.to;
      const wasK=isKing(board[j.from[0]][j.from[1]]);
      const nowK=isKing(nb[tr][tc]);
      if(!wasK&&nowK){
        seqs.push({moves:[j],board:nb}); continue;
      }
      const chains=getChainMoves(nb,tr,tc,pl);
      for(const ch of chains){
        const seq={moves:[j,...ch.moves],board:ch.board};
        seqs.push(seq);
      }
    }
    return seqs.length>0?seqs:[{moves:[],board}];
  }
  // Normal moves
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    if(belongs(board[r][c],pl)){
      for(const m of getMoves(board,r,c,pl)){
        seqs.push({moves:[m],board:applyMove(board,m)});
      }
    }
  }
  return seqs;
}

function minimax(board,depth,alpha,beta,maximizing){
  const pl=maximizing?"black":"red";
  const seqs=getAllSequences(board,pl);
  if(depth===0||seqs.length===0){
    if(seqs.length===0) return maximizing?-1000:1000;
    return evalBoard(board);
  }
  if(maximizing){
    let best=-Infinity;
    for(const s of seqs){
      const val=minimax(s.board,depth-1,alpha,beta,false);
      best=Math.max(best,val);
      alpha=Math.max(alpha,best);
      if(beta<=alpha) break;
    }
    return best;
  } else {
    let best=Infinity;
    for(const s of seqs){
      const val=minimax(s.board,depth-1,alpha,beta,true);
      best=Math.min(best,val);
      beta=Math.min(beta,best);
      if(beta<=alpha) break;
    }
    return best;
  }
}

function getAIMove(board,difficulty){
  // difficulty: "easy"=1, "medium"=3, "hard"=5
  const depths={easy:1,medium:3,hard:5};
  const depth=depths[difficulty]||3;
  const seqs=getAllSequences(board,"black");
  if(seqs.length===0) return null;
  if(difficulty==="easy"){
    // Easy: pick random move with slight preference for captures
    const captures=seqs.filter(s=>s.moves[0]?.over);
    const pool=captures.length>0&&Math.random()>0.3?captures:seqs;
    return pool[Math.floor(Math.random()*pool.length)].moves;
  }
  let bestVal=-Infinity, bestSeqs=[];
  for(const s of seqs){
    const val=minimax(s.board,depth-1,-Infinity,Infinity,false);
    if(val>bestVal){bestVal=val;bestSeqs=[s];}
    else if(val===bestVal) bestSeqs.push(s);
  }
  // Pick randomly among equally good moves for variety
  const chosen=bestSeqs[Math.floor(Math.random()*bestSeqs.length)];
  return chosen.moves;
}

// Language context
const LangCtx=React.createContext({lang:"en",t:T.en,setLang:()=>{}});
function useLang(){return React.useContext(LangCtx);}

function LangProvider({children}){
  const [lang,setLangState]=useState(()=>{
    try{return localStorage.getItem("dp_lang")||"en";}catch{return"en";}
  });
  const setLang=code=>{
    setLangState(code);
    try{localStorage.setItem("dp_lang",code);}catch{}
    document.documentElement.dir=LANGS.find(l=>l.code===code)?.dir||"ltr";
  };
  useEffect(()=>{document.documentElement.dir=LANGS.find(l=>l.code===lang)?.dir||"ltr";},[]);
  return <LangCtx.Provider value={{lang,t:T[lang]||T.en,setLang}}>{children}</LangCtx.Provider>;
}

function Btn({children,onClick,disabled,variant="primary",style={}}){
  const base={padding:"11px 20px",border:"none",borderRadius:6,cursor:disabled?"default":"pointer",fontSize:13,fontWeight:"bold",letterSpacing:1,transition:"all 0.2s",...style};
  const variants={
    primary:{background:disabled?"#2a1e0c":"#d4a84b",color:disabled?"#4a3a20":"#0b0908"},
    ghost:{background:"transparent",color:"#6a5a30",border:"1px solid #2a1a08"},
    danger:{background:"transparent",color:"#8a3820",border:"1px solid #3a1808"},
    green:{background:disabled?"#1a2a18":"#2a6a20",color:disabled?"#2a3a28":"#c8f0c0",border:"none"},
  };
  return <button onClick={!disabled?onClick:undefined} style={{...base,...variants[variant],opacity:disabled?0.5:1}}>{children}</button>;
}

      const ok=await claimFreeCoins(userId);
      if(ok){const nc=await getCoins(userId);onUpdate(nc);setMsg("🎁 500 starter coins added!");}
      else setMsg("⚠ Starter pack already claimed.");

      // Simulate purchase — in prod replace with real payment
      await addCoins(userId,pack.coins);
      const nc=await getCoins(userId);onUpdate(nc);

            <div style={{fontSize:11,letterSpacing:4,color:"#5a4020",marginBottom:2}}>{t.coinShop}</div>
            <div style={{fontSize:22,color:GOLD,fontWeight:"bold"}}>🪙 {fmtC(coins)} coins</div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"1px solid #2a1808",color:"#5a4028",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:13}}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {COIN_PACKS.map(pack=>(
            <div key={pack.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"#0f0b07",border:"1px solid #2a1808",borderRadius:8}}>
              <span style={{fontSize:28}}>{pack.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:"bold",color:"#e8dcc8",fontSize:13}}>{pack.label}</div>
                <div style={{fontSize:12,color:GOLD,marginTop:1}}>🪙 {fmtC(pack.coins)} coins</div>

  );
}

// AUTH GATE
// ══════════════════════════════════════════════════════════════════════════
function AuthGate({onDone}){
  const {lang,t,setLang}=useLang();
  const [mode,setMode]=useState("login");
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [confirm,setConfirm]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [showPw,setShowPw]=useState(false);
  const [showLangMenu,setShowLangMenu]=useState(false);

  useEffect(()=>{
    try{const saved=localStorage.getItem("dp_session");if(saved){const s=JSON.parse(saved);if(s?.id&&s?.username)onDone(s);}}catch{}
  },[]);

  const hashPw=async pw=>{
    try{
      const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pw+"dp_salt_2024"));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }catch{return btoa(pw+"dp_salt_2024");}
  };

  const handleRegister=async()=>{
    setErr("");
    if(!username.trim()){setErr(t.errUserRequired);return;}
    if(username.trim().length<3){setErr(t.errUserShort);return;}
    if(!/^[a-zA-Z0-9_]+$/.test(username.trim())){setErr(t.errUserChars);return;}
    if(password.length<4){setErr(t.errPassShort);return;}
    if(password!==confirm){setErr(t.errPassMatch);return;}
    setLoading(true);
    const key=`users/${username.trim().toLowerCase()}`;
    const existing=await sget(key);
    if(existing){setErr(t.errUserTaken);setLoading(false);return;}
    const hash=await hashPw(password);
    const userId="u"+genCode();
    const account={id:userId,username:username.trim(),hash,wins:0,losses:0,gamesPlayed:0,joined:Date.now()};
    await sset(key,account);
    await claimFreeCoins(userId);
    const coins=await getCoins(userId);
    const session={id:userId,username:username.trim(),wins:0,losses:0,gamesPlayed:0,coins};
    localStorage.setItem("dp_session",JSON.stringify(session));
    setLoading(false);onDone(session);
  };

  const handleLogin=async()=>{
    setErr("");
    if(!username.trim()||!password){setErr(t.errEnterBoth);return;}
    setLoading(true);
    const key=`users/${username.trim().toLowerCase()}`;
    const account=await sget(key);
    if(!account){setErr(t.errNotFound);setLoading(false);return;}
    const hash=await hashPw(password);
    if(hash!==account.hash){setErr(t.errWrongPass);setLoading(false);return;}
    const coins=await getCoins(account.id);
    const session={id:account.id,username:account.username,wins:account.wins||0,losses:account.losses||0,gamesPlayed:account.gamesPlayed||0,coins};
    localStorage.setItem("dp_session",JSON.stringify(session));
    setLoading(false);onDone(session);
  };

  const inpStyle={width:"100%",padding:"13px 16px",background:"#0f0b07",border:"1px solid #3a2610",color:"#e8dcc8",fontSize:15,borderRadius:6,outline:"none",boxSizing:"border-box",marginBottom:14};
  const curLang=LANGS.find(l=>l.code===lang)||LANGS[0];

  return(
    <Screen>
      {/* Language switcher — top right */}
      <div style={{position:"fixed",top:16,right:16,zIndex:100}}>
        <button onClick={()=>setShowLangMenu(x=>!x)}
          style={{display:"flex",alignItems:"center",gap:6,padding:"7px 12px",background:"rgba(212,168,75,0.08)",border:"1px solid #3a2810",borderRadius:20,cursor:"pointer",color:GOLD,fontSize:13,fontWeight:"bold"}}>
          <span style={{fontSize:18}}>{curLang.flag}</span>
          <span style={{fontSize:12}}>{curLang.label}</span>
          <span style={{fontSize:10,color:"#5a4020"}}>{showLangMenu?"▲":"▼"}</span>
        </button>
        {showLangMenu&&(
          <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,background:"#18120a",border:"1px solid #3a2810",borderRadius:10,overflow:"hidden",minWidth:160,boxShadow:"0 8px 24px rgba(0,0,0,0.7)",animation:"slidein .15s ease"}}>
            {LANGS.map(l=>(
              <button key={l.code} onClick={()=>{setLang(l.code);setShowLangMenu(false);}}
                style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 14px",background:lang===l.code?"rgba(212,168,75,0.12)":"transparent",border:"none",borderBottom:"1px solid #1e1408",cursor:"pointer",color:lang===l.code?GOLD:"#a08040",fontSize:13,textAlign:"left"}}>
                <span style={{fontSize:18}}>{l.flag}</span>
                <span>{l.label}</span>
                {lang===l.code&&<span style={{marginLeft:"auto",fontSize:12}}>✓</span>}
              </button>
            ))}
          </div>
        )}
      </div>

      <Title/>
      <Card style={{maxWidth:380,width:"100%"}}>
        <div style={{display:"flex",borderBottom:"1px solid #1e1408",marginBottom:24}}>
          {[["login",t.login],["register",t.register]].map(([m,label])=>(
            <button key={m} onClick={()=>{setMode(m);setErr("");}}
              style={{flex:1,padding:"10px 0",background:"transparent",border:"none",borderBottom:mode===m?`2px solid ${GOLD}`:"2px solid transparent",color:mode===m?GOLD:"#4a3a18",cursor:"pointer",fontSize:13,letterSpacing:1,marginBottom:-1}}>
              {label}
            </button>
          ))}
        </div>

        <div style={{fontSize:11,letterSpacing:3,color:"#5a4020",marginBottom:18,textAlign:"center"}}>
          {mode==="login"?t.welcomeBack:t.createAccount}
        </div>

        <input value={username} onChange={e=>setUsername(e.target.value)} placeholder={t.username} maxLength={18}
          onKeyDown={e=>e.key==="Enter"&&(mode==="login"?handleLogin():handleRegister())} style={inpStyle}/>

        <div style={{position:"relative",marginBottom:14}}>
          <input value={password} onChange={e=>setPassword(e.target.value)} type={showPw?"text":"password"}
            placeholder={t.password} onKeyDown={e=>e.key==="Enter"&&(mode==="login"?handleLogin():handleRegister())}
            style={{...inpStyle,marginBottom:0,paddingRight:44}}/>
          <span onClick={()=>setShowPw(x=>!x)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",fontSize:18,color:"#4a3a18"}}>{showPw?"🙈":"👁"}</span>
        </div>

        {mode==="register"&&(
          <input value={confirm} onChange={e=>setConfirm(e.target.value)} type="password"
            placeholder={t.confirmPassword} onKeyDown={e=>e.key==="Enter"&&handleRegister()} style={inpStyle}/>
        )}

        {err&&<div style={{color:"#c06040",fontSize:12,marginBottom:14,padding:"8px 12px",background:"rgba(120,40,20,0.15)",borderRadius:5,border:"1px solid #4a2010"}}>{err}</div>}

        <Btn onClick={mode==="login"?handleLogin:handleRegister} disabled={loading} style={{width:"100%",padding:"13px",marginBottom:14}}>
          {loading?(mode==="login"?t.loggingIn:t.creating):(mode==="login"?t.login:t.createAccountBtn)}
        </Btn>

        <div style={{textAlign:"center",fontSize:12,color:"#3a2a10"}}>
          {mode==="login"?<>{t.noAccount} <span onClick={()=>{setMode("register");setErr("");}} style={{color:GOLD,cursor:"pointer"}}>{t.registerLink}</span></>
          :<>{t.haveAccount} <span onClick={()=>{setMode("login");setErr("");}} style={{color:GOLD,cursor:"pointer"}}>{t.loginLink}</span></>}
        </div>
      </Card>
      <div style={{marginTop:14,fontSize:11,color:"#2a1a08",textAlign:"center"}}>{t.savedDevice}</div>
    </Screen>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// LOBBY
// ══════════════════════════════════════════════════════════════════════════
function Lobby({myName,onStartGame,onLogout,session,onLeaderboard}){
  const {lang,t,setLang}=useLang();
  const [showLangMenu,setShowLangMenu]=useState(false);
  const [tab,setTab]=useState("find");
  const [playerId]=useState(()=>"pl"+genCode());
  const [players,setPlayers]=useState([]);
  const [pendingIn,setPendingIn]=useState(null);
  const [pendingOut,setPendingOut]=useState(null);
  const [joinCode,setJoinCode]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const [notice,setNotice]=useState("");
  const [quickQueue,setQuickQueue]=useState(false);
  const [onlineCount,setOnlineCount]=useState(0);
  const [coins,setCoins_]=useState(session?.coins||0);
  const [showShop,setShowShop]=useState(false);
  const [betAmt,setBetAmt]=useState(0);
  const userId=session?.id;
  const hbRef=useRef(null);
  const pollRef=useRef(null);
  const pendingOutRef=useRef(pendingOut);pendingOutRef.current=pendingOut;
  const quickQueueRef=useRef(quickQueue);quickQueueRef.current=quickQueue;
  const pendingInRef=useRef(pendingIn);pendingInRef.current=pendingIn;
  const notify=(msg,ms=4000)=>{setNotice(msg);setTimeout(()=>setNotice(""),ms);};
  const refreshCoins=async()=>{if(userId){const c=await getCoins(userId);setCoins_(c);return c;}return 0;};
  useEffect(()=>{refreshCoins();},[]);

  useEffect(()=>{
    const reg=async()=>{
      await sset(`presence/${playerId}`,{id:playerId,name:myName,status:"online",hb:Date.now()});
      hbRef.current=setInterval(async()=>{ await supdate(`presence/${playerId}`,{hb:Date.now()}); },HB_MS);
    };
    reg();
    return()=>{clearInterval(hbRef.current);clearInterval(pollRef.current);sdel(`presence/${playerId}`);sdel(`challenges/${playerId}`);};
  },[]);

  useEffect(()=>{
    const poll=async()=>{
      const now=Date.now();
      // Fetch all online players
      const allPlayers=await schildren("presence");
      const online=allPlayers.filter(p=>p.id!==playerId&&now-p.hb<OFFLINE_MS);
      setPlayers(online);setOnlineCount(online.length);
      const ch=await sget(`challenges/${playerId}`);
      if(ch&&ch.status==="pending"&&now-ch.at<30000){setPendingIn(ch);}
      else if(pendingInRef.current&&(!ch||ch.status!=="pending")){setPendingIn(null);}
      const po=pendingOutRef.current;
      if(po){
        const reply=await sget(`challenges/${po.toId}`);
        if(reply&&reply.roomCode===po.roomCode){
          if(reply.status==="accepted"){clearInterval(pollRef.current);await supdate(`presence/${playerId}`,{status:"ingame"});onStartGame(po.roomCode,"red",myName,po.toName,po.bet||0,session?.id||"guest");return;}
          if(reply.status==="declined"){setPendingOut(null);notify(`${po.toName} declined.`);}
        }
        if(now-po.at>30000){setPendingOut(null);notify(`Challenge timed out.`);sdel(`challenges/${po.toId}`);}
      }
      if(quickQueueRef.current){
        const queue=await sget("quickmatch/queue");
        if(queue&&queue.id!==playerId&&now-queue.hb<15000){
          clearInterval(pollRef.current);setQuickQueue(false);
          await sdel("quickmatch/queue");
          await supdate(`presence/${playerId}`,{status:"ingame",hb:Date.now()});
          notify("⚡ Match found!",2000);
          setTimeout(()=>onStartGame(queue.roomCode,"black",myName,queue.name,0,userId),700);
        }
      }
    };
    pollRef.current=setInterval(poll,POLL_MS);poll();
    return()=>clearInterval(pollRef.current);
  },[playerId,myName]);

  const sendChallenge=async target=>{
    if(pendingOut||pendingIn)return;
    if(betAmt>0){const ok=await deductCoins(userId,betAmt);if(!ok){notify("⚠ Not enough coins for this bet.");return;}await refreshCoins();}
    const code=genCode();
    await sset(`rooms/${code}`,{board:initBoard(),current:"red",log:[`⚔ ${myName} vs ${target.name}. Red first!`],winner:null,capRed:0,capBlack:0,moveCount:0,players:{red:playerId,black:target.id},names:{red:myName,black:target.name},version:1,bet:betAmt,betRed:userId,betBlack:null});
    await sset(`challenges/${target.id}`,{fromId:playerId,fromName:myName,toId:target.id,toName:target.name,roomCode:code,status:"pending",at:Date.now(),bet:betAmt});
    setPendingOut({toId:target.id,toName:target.name,roomCode:code,at:Date.now()});
  };
  const cancelChallenge=async()=>{if(pendingOut){await sdel(`challenges/${pendingOut.toId}`);setPendingOut(null);}};
  const acceptChallenge=async()=>{
    if(!pendingIn)return;
    if(pendingIn.bet>0){const ok=await deductCoins(userId,pendingIn.bet);if(!ok){notify("⚠ Not enough coins to match this bet. Ask challenger to lower it.");return;}await refreshCoins();
      // record black's bet in room
      const rm=await sget(`rooms/${pendingIn.roomCode}`);if(rm){await sset(`rooms/${pendingIn.roomCode}`,{...rm,betBlack:userId});}
    }
    await sset(`challenges/${playerId}`,{...pendingIn,status:"accepted"});
    await supdate(`presence/${playerId}`,{status:"ingame",hb:Date.now()});
    clearInterval(hbRef.current);clearInterval(pollRef.current);
    onStartGame(pendingIn.roomCode,"black",myName,pendingIn.fromName,pendingIn.bet||0,userId);
  };
  const declineChallenge=async()=>{if(!pendingIn)return;await sset(`challenges/${playerId}`,{...pendingIn,status:"declined"});setPendingIn(null);};
  const joinQuickMatch=async()=>{
    setBusy(true);
    const existing=await sget("quickmatch/queue");const now=Date.now();
    if(existing&&existing.id!==playerId&&now-existing.hb<15000){
      await sdel("quickmatch/queue");await supdate(`presence/${playerId}`,{status:"ingame",hb:Date.now()});
      setBusy(false);onStartGame(existing.roomCode,"black",myName,existing.name,0,userId);return;
    }
    const code=genCode();
    await sset(`rooms/${code}`,{board:initBoard(),current:"red",log:["Quick Match ready…"],winner:null,capRed:0,capBlack:0,moveCount:0,players:{red:playerId,black:null},names:{red:myName,black:"?"},version:0,bet:0});
    await sset("quickmatch/queue",{id:playerId,name:myName,roomCode:code,hb:now});
    await supdate(`presence/${playerId}`,{status:"queued",hb:Date.now()});
    setQuickQueue(true);setBusy(false);
  };
  const leaveQuickMatch=async()=>{const q=await sget("quickmatch/queue");if(q&&q.id===playerId)await sdel("quickmatch/queue");await supdate(`presence/${playerId}`,{status:"online",hb:Date.now()});setQuickQueue(false);};
  const createRoom=async()=>{
    setBusy(true);setErr("");
    if(betAmt>0){const ok=await deductCoins(userId,betAmt);if(!ok){setErr("⚠ Not enough coins for this bet.");setBusy(false);return;}await refreshCoins();}
    const code=genCode();
    await sset(`rooms/${code}`,{board:initBoard(),current:"red",log:["Waiting for opponent…"],winner:null,capRed:0,capBlack:0,moveCount:0,players:{red:playerId,black:null},names:{red:myName,black:"?"},version:0,bet:betAmt,betRed:userId,betBlack:null});
    setBusy(false);onStartGame(code,"red",myName,null,betAmt,userId);
  };
  const joinRoom=async()=>{
    const c=joinCode.trim().toUpperCase();
    if(c.length<5){setErr("Enter a valid room code.");return;}
    setBusy(true);setErr("");
    const room=await sget(`rooms/${c}`);
    if(!room){setErr("Room not found.");setBusy(false);return;}
    if(room.players.black!==null&&room.players.black!==undefined){setErr("Room is full!");setBusy(false);return;}
    const roomBet=room.bet||0;
    if(roomBet>0){
      const ok=await deductCoins(userId,roomBet);
      if(!ok){setErr(`⚠ Need 🪙${fmtC(roomBet)} to join this room. Buy more coins.`);setBusy(false);return;}
      await refreshCoins();
    }
    room.players.black=playerId;room.names.black=myName;room.betBlack=userId;
    room.log=[`⚡ ${myName} joined!`,...room.log];room.version=(room.version||0)+1;
    await sset(`rooms/${c}`,room);setBusy(false);onStartGame(c,"black",myName,room.names.red,roomBet,userId);
  };

  const TABS=[{id:"find",label:t.find},{id:"quick",label:t.quick},{id:"code",label:t.code},{id:"local",label:t.local}];

  return(
    <Screen center={false}>
      {showShop&&<CoinShop coins={coins} userId={userId} onClose={()=>setShowShop(false)} onUpdate={c=>{setCoins_(c);const s=JSON.parse(localStorage.getItem("dp_session")||"{}");localStorage.setItem("dp_session",JSON.stringify({...s,coins:c}));}}/>}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:"100%",maxWidth:620,margin:"0 auto"}}>
        <Title sub={`${t.welcome} ${myName}!`}/>

        {/* Profile card */}
        <div style={{width:"100%",marginBottom:16,background:CARD,border:"1px solid #2a1808",borderRadius:10,overflow:"hidden"}}>
          {/* Row 1 — action buttons */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 14px",borderBottom:"1px solid #1e1408",background:"#14100a",gap:8}}>
            <WalletBar coins={coins} onShop={()=>setShowShop(true)}/>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {/* Language picker */}
              <div style={{position:"relative"}}>
                <button onClick={()=>setShowLangMenu(x=>!x)}
                  style={{display:"flex",alignItems:"center",gap:5,padding:"6px 10px",background:"rgba(212,168,75,0.07)",border:"1px solid #2a1808",borderRadius:6,cursor:"pointer",color:GOLD,fontSize:11}}>
                  <span style={{fontSize:15}}>{LANGS.find(l=>l.code===lang)?.flag}</span>
                  <span style={{fontSize:9,color:"#5a4020"}}>{showLangMenu?"▲":"▼"}</span>
                </button>
                {showLangMenu&&(
                  <div style={{position:"absolute",top:"calc(100% + 5px)",right:0,background:"#18120a",border:"1px solid #3a2810",borderRadius:10,overflow:"hidden",minWidth:155,boxShadow:"0 8px 24px rgba(0,0,0,0.8)",zIndex:200,animation:"slidein .15s ease"}}>
                    {LANGS.map(l=>(
                      <button key={l.code} onClick={()=>{setLang(l.code);setShowLangMenu(false);}}
                        style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"9px 13px",background:lang===l.code?"rgba(212,168,75,0.12)":"transparent",border:"none",borderBottom:"1px solid #1e1408",cursor:"pointer",color:lang===l.code?GOLD:"#a08040",fontSize:12,textAlign:"left"}}>
                        <span style={{fontSize:17}}>{l.flag}</span>
                        <span style={{flex:1}}>{l.label}</span>
                        {lang===l.code&&<span style={{fontSize:11,color:GOLD}}>✓</span>}
                      </button>
                    ))}
                  </div>
                )}
              </div>
              <Btn variant="ghost" onClick={onLeaderboard} style={{padding:"6px 14px",fontSize:11}}>{t.ranks}</Btn>
              <Btn variant="danger" onClick={onLogout} style={{padding:"6px 14px",fontSize:11}}>{t.logout}</Btn>
            </div>
          </div>
          {/* Row 2 — player info */}
          <div style={{display:"flex",alignItems:"center",gap:14,padding:"12px 18px"}}>
            <Avatar name={myName} size={46}/>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:"bold",color:"#e8dcc8",marginBottom:4}}>{myName}</div>
              {session&&<div style={{fontSize:11,color:"#5a4a28",display:"flex",gap:14,flexWrap:"wrap"}}>
                <span style={{color:"#3a7a30"}}>🏆 {session.wins||0} {t.wins}</span>
                <span style={{color:"#7a3a28"}}>💀 {session.losses||0} {t.losses}</span>
                <span style={{color:"#4a4a28"}}>🎮 {session.gamesPlayed||0} {t.played}</span>
              </div>}
            </div>
          </div>
        </div>

        {/* Bet Selector */}
        <div style={{width:"100%",marginBottom:14,padding:"14px 18px",background:"#18120a",border:"1px solid #2a1808",borderRadius:10}}>
          <div style={{fontSize:11,letterSpacing:3,color:"#5a4020",marginBottom:10}}>{t.setBet}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {BET_OPTS.map(b=>(
              <button key={b} onClick={()=>setBetAmt(b)}
                style={{padding:"7px 12px",fontSize:12,fontWeight:"bold",background:betAmt===b?"#d4a84b":"#0f0b07",color:betAmt===b?"#0b0908":b===0?"#5a4a28":coins>=b?"#c8a030":"#4a3020",border:`1px solid ${betAmt===b?"#d4a84b":b===0?"#1e1408":"#3a2610"}`,borderRadius:6,cursor:b>0&&coins<b?"default":"pointer",opacity:b>0&&coins<b?0.4:1}}>
                {b===0?t.free:"🪙"+fmtC(b)}
              </button>
            ))}
          </div>
          {betAmt>0&&<div style={{marginTop:8,fontSize:11,color:"#a08030"}}>{t.pot} 🪙{fmtC(betAmt*2)} · {t.winnerGets} 🪙{fmtC(Math.floor(betAmt*2*WIN_CUT))}</div>}
        </div>

        {pendingIn&&(
          <div style={{width:"100%",marginBottom:14,padding:"16px 20px",background:"linear-gradient(135deg,rgba(212,168,75,0.14),rgba(140,80,10,0.1))",border:"2px solid #c8982a",borderRadius:12,animation:"fadein 0.3s ease"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <Avatar name={pendingIn.fromName} size={44}/>
              <div style={{flex:1}}>
                <div style={{color:GOLD,fontWeight:"bold",fontSize:14,marginBottom:2}}>⚔ Challenge Received!</div>
                <div style={{color:"#a89050",fontSize:13}}><strong style={{color:"#e8dcc8"}}>{pendingIn.fromName}</strong> wants to play!{pendingIn.bet>0&&<span style={{marginLeft:8,color:"#d4a84b"}}>Bet: 🪙{fmtC(pendingIn.bet)}</span>}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <Btn variant="green" onClick={acceptChallenge} style={{padding:"8px 14px",fontSize:12}}>✅ Accept</Btn>
                <Btn variant="danger" onClick={declineChallenge} style={{padding:"8px 12px",fontSize:12}}>✕</Btn>
              </div>
            </div>
          </div>
        )}

        {pendingOut&&(
          <div style={{width:"100%",marginBottom:10,padding:"10px 16px",background:"rgba(80,60,10,0.25)",border:"1px solid #5a4010",borderRadius:8,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14}}>⏳</span>
            <div style={{flex:1,fontSize:13,color:"#c8a030"}}>{t.waiting} <strong style={{color:"#e8dcc8"}}>{pendingOut.toName}</strong>…</div>
            <Btn variant="ghost" onClick={cancelChallenge} style={{padding:"4px 10px",fontSize:11}}>{t.cancel}</Btn>
          </div>
        )}

        {quickQueue&&(
          <div style={{width:"100%",marginBottom:10,padding:"10px 16px",background:"linear-gradient(135deg,rgba(30,80,30,0.3),rgba(20,60,20,0.2))",border:"1px solid #2a6020",borderRadius:8,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>🔍</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,color:"#6ad060",fontWeight:"bold"}}>Searching for opponent…</div>
              <div style={{fontSize:11,color:"#3a6030"}}>You'll be matched automatically</div>
            </div>
            <Btn variant="danger" onClick={leaveQuickMatch} style={{padding:"5px 12px",fontSize:11}}>{t.cancel}</Btn>
          </div>
        )}

        {notice&&<div style={{width:"100%",marginBottom:8,padding:"8px 14px",background:"rgba(80,60,10,0.2)",border:"1px solid #4a3010",borderRadius:6,color:"#c8a030",fontSize:12,textAlign:"center"}}>{notice}</div>}

        <div style={{display:"flex",width:"100%",borderBottom:"1px solid #1a1208",marginBottom:18}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>{setTab(t.id);setErr("");}}
              style={{flex:1,padding:"10px 4px",background:"transparent",border:"none",borderBottom:tab===t.id?`2px solid ${GOLD}`:"2px solid transparent",color:tab===t.id?GOLD:"#3a2a12",cursor:"pointer",fontSize:12,marginBottom:-1}}>
              {t.label}
            </button>
          ))}
        </div>

        {tab==="find"&&<FindTab players={players} onlineCount={onlineCount} myName={myName} pendingOut={pendingOut} pendingIn={pendingIn} onChallenge={sendChallenge}/>}
        {tab==="quick"&&<QuickTab inQueue={quickQueue} busy={busy} onJoin={joinQuickMatch} onLeave={leaveQuickMatch} onlineCount={onlineCount}/>}

        {tab==="code"&&(
          <Card style={{width:"100%"}}>
            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#4a3a18",marginBottom:8,textAlign:"center"}}>CREATE A PRIVATE ROOM</div>
              <Btn onClick={createRoom} disabled={busy} style={{width:"100%",padding:"13px"}}>{busy?t.creating:"✨ Create Room"}</Btn>
            </div>
            <div style={{borderTop:"1px solid #1e1408",paddingTop:18}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#4a3a18",marginBottom:8,textAlign:"center"}}>JOIN WITH A CODE</div>
              <input value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&joinRoom()} maxLength={6} placeholder="XXXXXX"
                style={{width:"100%",padding:"13px",textAlign:"center",fontSize:26,letterSpacing:10,background:"#0f0b07",color:GOLD,border:"2px solid #3a2610",borderRadius:6,outline:"none",boxSizing:"border-box",marginBottom:10}}/>
              {err&&<div style={{color:"#c06040",fontSize:12,marginBottom:8,textAlign:"center"}}>{err}</div>}
              <Btn onClick={joinRoom} disabled={busy||joinCode.length<5} style={{width:"100%",padding:"12px"}}>{busy?t.loggingIn:"🚀 Join Room"}</Btn>
            </div>
          </Card>
        )}

        {tab==="local"&&(
          <Card style={{width:"100%"}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:36,marginBottom:8}}>🤖</div>
              <div style={{color:GOLD,fontSize:15,marginBottom:4,letterSpacing:1}}>OFFLINE MODE</div>
              <div style={{color:"#5a4a28",fontSize:12}}>Play alone vs AI or with a friend on same device</div>
            </div>
            {/* VS AI */}
            <div style={{marginBottom:18,padding:"14px 16px",background:"#14100a",border:"1px solid #2a1808",borderRadius:8}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#5a4020",marginBottom:10}}>🤖 VS COMPUTER</div>
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                {[["easy","🟢 Easy","Beginner friendly"],["medium","🟡 Medium","Good challenge"],["hard","🔴 Hard","Expert level"]].map(([d,label,desc])=>(
                  <div key={d} onClick={()=>onStartGame(null,"ai:"+d,myName,"🤖 Computer",0,session?.id||"guest")}
                    style={{flex:1,padding:"10px 6px",background:"#0f0b07",border:"1px solid #2a1808",borderRadius:8,cursor:"pointer",textAlign:"center",transition:"all .2s"}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor="#d4a84b"}
                    onMouseLeave={e=>e.currentTarget.style.borderColor="#2a1808"}>
                    <div style={{fontSize:16,marginBottom:4}}>{label.split(" ")[0]}</div>
                    <div style={{fontSize:11,fontWeight:"bold",color:GOLD,marginBottom:2}}>{label.split(" ")[1]}</div>
                    <div style={{fontSize:9,color:"#5a4a28"}}>{desc}</div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:10,color:"#3a2a10",textAlign:"center"}}>You play as 🔴 Red · AI plays as ⚫ Black</div>
            </div>
            {/* Local 2P */}
            <div style={{padding:"14px 16px",background:"#14100a",border:"1px solid #2a1808",borderRadius:8}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#5a4020",marginBottom:10}}>🖥 LOCAL 2-PLAYER</div>
              <div style={{color:"#5a4a28",fontSize:12,lineHeight:1.8,marginBottom:12}}>Both players share one device. Take turns together.</div>
              <Btn onClick={()=>onStartGame(null,"local",myName,"Player 2",0,session?.id||"guest")} style={{width:"100%",padding:"11px"}}>START LOCAL GAME</Btn>
            </div>
          </Card>
        )}

        {tab==="ai"&&<AITab myName={myName} onStartGame={onStartGame}/>}

        <div style={{marginTop:16,fontSize:10,color:"#2a1a08",textAlign:"center"}}>
          <span style={{color:"#3a6a2a"}}>● {onlineCount} player{onlineCount!==1?"s":""} online</span> · Your name is visible to others
        </div>
      </div>
    </Screen>
  );
}

// ── AI Tab ─────────────────────────────────────────────────────────────────
function AITab({myName,onStartGame}){
  const {t}=useLang();
  const [diff,setDiff]=useState("medium");
  const levels=[
    {id:"easy",label:"🟢 Easy",desc:"Random moves, good for beginners"},
    {id:"medium",label:"🟡 Medium",desc:"Thinks 2 moves ahead, some strategy"},
    {id:"hard",label:"🔴 Hard",desc:"Thinks 5 moves ahead, very challenging"},
  ];
  return(
    <Card style={{width:"100%"}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:44,marginBottom:8}}>🤖</div>

                  </div>

                  <Btn onClick={()=>canChallenge&&onChallenge(p)} disabled={!canChallenge} variant={canChallenge?"primary":"ghost"} style={{padding:"8px 14px",fontSize:12,flexShrink:0}}>
                    {busy2?"🎮 Busy":"⚔ Challenge"}
                  </Btn>

// ══════════════════════════════════════════════════════════════════════════
// GAME
// ══════════════════════════════════════════════════════════════════════════
function Game({roomCode,myColor,myName,opName,betAmt=0,userId="guest",onLeave}){
  const {t}=useLang();
  const isAI=myColor&&myColor.startsWith("ai:");
  const aiDiff=isAI?myColor.split(":")[1]:"medium";
  const online=!isAI&&myColor!=="local";
  const playerColor=isAI?"red":myColor; // human always red vs AI
  const [board,setBoard]=useState(initBoard);
  const [cur,setCur]=useState("red");
  const [sel,setSel]=useState(null);
  const [valid,setValid]=useState([]);
  const [mustJ,setMustJ]=useState(false);
  const [chain,setChain]=useState(null);
  const [log,setLog]=useState(isAI?[`You vs AI (${aiDiff}). You are 🔴 Red!`]:online?[]:[`Local game started! Red moves first.`]);
  const [win,setWin]=useState(null);
  const [capR,setCapR]=useState(0);
  const [capB,setCapB]=useState(0);
  const [lastMv,setLastMv]=useState(null);
  const [rules,setRules]=useState(false);
  const [moves,setMoves]=useState(0);
  const [kings,setKings]=useState({red:0,black:0});
  const [oppOnline,setOppOnline]=useState(!!opName);
  const [sync,setSync]=useState(online?"syncing":"ok");
  const [aiThinking,setAiThinking]=useState(false);
  const [aiJustMoved,setAiJustMoved]=useState(false);
  const [names,setNames]=useState({
    red:isAI?myName:(playerColor==="red"?myName:(opName||"Red")),
    black:isAI?"🤖 AI":(playerColor==="black"?myName:(opName||"Black"))
  });
  const [payoutShown,setPayoutShown]=useState(false);
  const [myCoins,setMyCoins]=useState(0);
  const payoutDone=useRef(false);
  const ver=useRef(0);
  const [cs,setCs]=useState(48);

  // ── Chat state ────────────────────────────────────────────────────────────
  const [chatOpen,setChatOpen]=useState(false);
  const [chatInput,setChatInput]=useState("");
  const [chatMessages,setChatMessages]=useState([]);
  const [chatUnread,setChatUnread]=useState(0);
  const [floatingEmoji,setFloatingEmoji]=useState(null);
  const chatEndRef=useRef(null);
  const chatOpenRef=useRef(chatOpen);chatOpenRef.current=chatOpen;
  const QUICK_EMOJIS=["👍","😂","😮","😢","🔥","💀","👑","🤝","⚔️","😤"];

  // ── Rematch state ─────────────────────────────────────────────────────────
  const [rematchOffer,setRematchOffer]=useState(null); // "sent"|"received"|null
  const [rematchDeclined,setRematchDeclined]=useState(false);

  // ── Draw offer state ──────────────────────────────────────────────────────
  const [drawOffer,setDrawOffer]=useState(null);   // "sent" | "received" | null
  const [drawResult,setDrawResult]=useState(null); // "agreed" | "declined" | null

  // Load coins and deduct bet on mount
  useEffect(()=>{
    const init=async()=>{
      const c=await getCoins(userId);
      if(online&&betAmt>0&&!payoutDone.current){
        await deductCoins(userId,betAmt);
        setMyCoins(c-betAmt);
      } else {
        setMyCoins(c);
      }
    };
    init();
  },[]);

  useEffect(()=>{const f=()=>setCs(Math.max(30,Math.min(80,Math.floor((window.innerWidth-40)/8),Math.floor((window.innerHeight-260)/8))));f();window.addEventListener("resize",f);return()=>window.removeEventListener("resize",f);},[]);
  useEffect(()=>{let rk=0,bk=0;for(let r=0;r<8;r++)for(let c=0;c<8;c++){if(board[r][c]===RED_KING)rk++;if(board[r][c]===BLACK_KING)bk++;}setKings({red:rk,black:bk});},[board]);
  useEffect(()=>{if(win)return;if(isAI&&cur==="black"&&aiThinking)return;if(allMoves(board,cur).length===0){const w=opp(cur);setWin(w);setLog(l=>[`🏆 ${names[w]} WINS!`,...l].slice(0,40));}},[board,cur,win,aiThinking]);

  // Use refs to avoid stale closures in AI/timeout callbacks
  const boardRef=useRef(board);boardRef.current=board;
  const curRef=useRef(cur);curRef.current=cur;
  const logRef=useRef(log);logRef.current=log;
  const capRRef=useRef(capR);capRRef.current=capR;
  const capBRef=useRef(capB);capBRef.current=capB;
  const movesRef=useRef(moves);movesRef.current=moves;
  const winRef=useRef(win);winRef.current=win;

  // Core move executor — applies ONE move to a given board state, returns new state
  const applyOneMove=(boardState,mv,ap,currentCapR,currentCapB,currentLog,currentMoves)=>{
    const nb=applyMove(boardState,mv);
    const[tr,tc]=mv.to,piece=nb[tr][tc];
    const pn=names[ap]||(ap==="red"?"Red":"Black");
    let msg=`${ap==="red"?"🔴":"⚫"} ${pn}: (${mv.from[0]},${mv.from[1]})→(${tr},${tc})`;
    let nr=currentCapR,nb2=currentCapB;
    if(mv.over){msg+=" ⚔";if(ap==="red")nb2=currentCapB+1;else nr=currentCapR+1;}
    const wasK=(ap==="red"&&boardState[mv.from[0]][mv.from[1]]===RED_KING)||(ap==="black"&&boardState[mv.from[0]][mv.from[1]]===BLACK_KING);
    if(!wasK&&(piece===RED_KING||piece===BLACK_KING))msg+=" 👑 KING!";
    const nl=[msg,...currentLog].slice(0,40);
    return{board:nb,capR:nr,capB:nb2,log:nl,moves:currentMoves+1,to:[tr,tc],piece};
  };

  // AI move trigger — fires when it's black's turn in AI mode
  useEffect(()=>{
    if(!isAI||win||cur!=="black")return;
    if(aiThinking)return;
    setAiThinking(true);
    const delay=aiDiff==="hard"?900:aiDiff==="medium"?600:350;
    const t=setTimeout(()=>{
      const b=boardRef.current;
      if(winRef.current){setAiThinking(false);return;}
      const sequence=getAIMove(b,aiDiff); // returns array of moves [{from,to,over},...]
      if(!sequence||sequence.length===0){setAiThinking(false);return;}

      // Animate each capture step one by one with a delay between them
      const stepDelay=320;
      let currentBoard=b;
      let currentCapR=capRRef.current;
      let currentCapB=capBRef.current;
      let currentLog=logRef.current;
      let currentMoves=movesRef.current;

      const applyStep=(index)=>{
        if(winRef.current){setAiThinking(false);return;}
        const mv=sequence[index];
        const result=applyOneMove(currentBoard,mv,"black",currentCapR,currentCapB,currentLog,currentMoves);
        currentBoard=result.board;
        currentCapR=result.capR;
        currentCapB=result.capB;
        currentLog=result.log;
        currentMoves=result.moves;

        // Show intermediate board state for multi-captures
        setBoard(currentBoard);
        setLastMv(mv);
        setCapR(currentCapR);
        setCapB(currentCapB);
        setLog(currentLog);
        setMoves(currentMoves);

        if(index<sequence.length-1){
          // More jumps to go — pause so player can see each capture
          setTimeout(()=>applyStep(index+1), stepDelay);
        } else {
          // Final move — commit turn change
          setCur("red");
          setChain(null);setSel(null);setValid([]);
          setAiThinking(false);
          setAiJustMoved(true);
          setTimeout(()=>setAiJustMoved(false),700);
        }
      };

      applyStep(0);
    },delay);
    return()=>clearTimeout(t);
  },[cur,isAI,aiDiff]);

  // Human move executor
  const execMove=useCallback((boardState,mv,ap)=>{
    const nb=applyMove(boardState,mv);const[tr,tc]=mv.to,piece=nb[tr][tc];
    const pn=names[ap]||(ap==="red"?"Red":"Black");
    let msg=`${ap==="red"?"🔴":"⚫"} ${pn}: (${mv.from[0]},${mv.from[1]})→(${tr},${tc})`;
    let nr=capR,nb2=capB;
    if(mv.over){msg+=" ⚔";if(ap==="red")nb2=capB+1;else nr=capR+1;}
    const wasK=(ap==="red"&&boardState[mv.from[0]][mv.from[1]]===RED_KING)||(ap==="black"&&boardState[mv.from[0]][mv.from[1]]===BLACK_KING);
    if(!wasK&&(piece===RED_KING||piece===BLACK_KING))msg+=" 👑 KING!";
    const nl=[msg,...log].slice(0,40);const nm=moves+1;
    // Check for chain jump — allowed for human in ALL modes (local, online, vs AI)
    if(mv.over){
      const fj=getJumps(nb,tr,tc,ap);
      // Stop chain if this piece just became a king
      const justKinged=!wasK&&(piece===RED_KING||piece===BLACK_KING);
      if(fj.length>0&&!justKinged){
        const cl=[`${pn} continues! ⚡`,...nl].slice(0,40);
        setBoard(nb);setLastMv(mv);setMoves(nm);setLog(cl);setCapR(nr);setCapB(nb2);
        setChain([tr,tc]);setSel([tr,tc]);setValid(fj);
        if(online)push({board:nb,current:cur,log:cl,capRed:nr,capBlack:nb2,moveCount:nm});
        return;
      }
    }
    const nc=opp(ap);
    setBoard(nb);setLastMv(mv);setMoves(nm);setLog(nl);setCapR(nr);setCapB(nb2);
    setCur(nc);setChain(null);setSel(null);setValid([]);
    if(online)push({board:nb,current:nc,log:nl,capRed:nr,capBlack:nb2,moveCount:nm});
  },[board,cur,log,capR,capB,moves,online,push,names]);
  useEffect(()=>{
    if(!win||win==="draw"||payoutDone.current||betAmt===0)return;
    payoutDone.current=true;
    const won=online&&win===myColor;
    const doPayout=async()=>{
      if(won){
        const winAmt=Math.floor(betAmt*2*WIN_CUT);
        const newBal=await addCoins(userId,winAmt);
        setMyCoins(newBal);
      } else {
        const bal=await getCoins(userId);
        setMyCoins(bal);
      }
      setPayoutShown(true);
    };
    doPayout();
  },[win]);

  // Auto-scroll chat to bottom
  useEffect(()=>{if(chatOpen&&chatEndRef.current)chatEndRef.current.scrollIntoView({behavior:"smooth"});},[chatMessages,chatOpen]);

  // Floating emoji animation helper
  const showFloatingEmoji=(emoji)=>{
    const id=Date.now();
    setFloatingEmoji({emoji,id});
    setTimeout(()=>setFloatingEmoji(f=>f?.id===id?null:f),2200);
  };

  useEffect(()=>{
    if(!online)return;
    const poll=async()=>{
      const r=await sget(`rooms/${roomCode}`);if(!r){setSync("error");return;}setSync("ok");
      if(r.names)setNames(r.names);
      setOppOnline(r.players&&r.players[opp(myColor)]!==null);
      if((r.version||0)>ver.current){
        ver.current=r.version||0;setBoard(r.board);setCur(r.current);setLog(r.log||[]);
        setCapR(r.capRed||0);setCapB(r.capBlack||0);setMoves(r.moveCount||0);
        if(r.winner)setWin(r.winner);setSel(null);setValid([]);setChain(null);
      }
      // ── Draw offer sync ──
      const draw=r.drawOffer;
      if(draw&&draw.by&&draw.by!==myColor&&draw.status==="pending"){
        setDrawOffer("received");
      } else if(draw&&draw.by===myColor&&draw.status==="pending"){
        setDrawOffer("sent");
      } else if(draw&&draw.status==="agreed"&&!win){
        setDrawOffer(null);
        setDrawResult("agreed");
        setWin("draw");
        setLog(l=>[`🤝 Draw agreed by both players!`,...l].slice(0,40));
        // Refund the offerer's bet (accepter already refunded in acceptDraw)
        if(betAmt>0&&draw.by===myColor){
          await addCoins(userId,betAmt);
          const newBal=await getCoins(userId);
          setMyCoins(newBal);
        }
      } else if(draw&&draw.status==="declined"&&draw.by===myColor){
        setDrawOffer(null);
        setDrawResult("declined");
        setTimeout(()=>setDrawResult(null),3000);
      } else if(!draw){
        setDrawOffer(null);
      }
      // ── Chat sync ──
      const msgs=r.chat||[];
      setChatMessages(prev=>{
        if(prev.length!==msgs.length){
          const newMsgs=msgs.slice(prev.length);
          newMsgs.forEach(m=>{
            if(m.color!==myColor&&m.type==="emoji")showFloatingEmoji(m.text);
            if(!chatOpenRef.current&&m.color!==myColor)setChatUnread(u=>u+1);
          });
        }
        return msgs;
      });
      // ── Rematch sync ──
      const rm=r.rematch;
      if(rm&&rm.by&&rm.by!==myColor&&rm.status==="pending")setRematchOffer("received");
      else if(rm&&rm.by===myColor&&rm.status==="pending")setRematchOffer("sent");
      else if(rm&&rm.status==="accepted"&&rm.by!==myColor){
        // Opponent accepted — trigger reset
        setRematchOffer(null);
        await sset(`rooms/${roomCode}`,{...r,rematch:null,board:initBoard(),current:"red",log:[`🔄 Rematch! ${r.names?.red||"Red"} vs ${r.names?.black||"Black"}.`],winner:null,capRed:0,capBlack:0,moveCount:0,chat:[],version:(r.version||0)+1});
      } else if(rm&&rm.status==="declined"&&rm.by===myColor){
        setRematchOffer(null);setRematchDeclined(true);
        setTimeout(()=>setRematchDeclined(false),3000);
      } else if(!rm){
        setRematchOffer(null);
      }
    };
    poll();const t=setInterval(poll,POLL_MS);return()=>clearInterval(t);
  },[online,roomCode,myColor]);

  // ── Draw actions ──────────────────────────────────────────────────────────
  const offerDraw=async()=>{
    if(!online||win||drawOffer)return;
    const r=await sget(`rooms/${roomCode}`);if(!r)return;
    await sset(`rooms/${roomCode}`,{...r,drawOffer:{by:myColor,status:"pending"},version:(r.version||0)+1});
    setDrawOffer("sent");
    setLog(l=>[`🤝 ${names[myColor]} offered a draw…`,...l].slice(0,40));
  };
  const acceptDraw=async()=>{
    if(!online||drawOffer!=="received")return;
    const r=await sget(`rooms/${roomCode}`);if(!r)return;
    // Refund bets on draw
    if(betAmt>0){
      await addCoins(userId,betAmt);
      const newBal=await getCoins(userId);
      setMyCoins(newBal);
    }
    await sset(`rooms/${roomCode}`,{...r,drawOffer:{...r.drawOffer,status:"agreed"},winner:"draw",version:(r.version||0)+1});
    setDrawOffer(null);setDrawResult("agreed");setWin("draw");
    setLog(l=>[`🤝 Draw agreed by both players!`,...l].slice(0,40));
  };
  const declineDraw=async()=>{
    if(!online||drawOffer!=="received")return;
    const r=await sget(`rooms/${roomCode}`);if(!r)return;
    await sset(`rooms/${roomCode}`,{...r,drawOffer:{...r.drawOffer,status:"declined"},version:(r.version||0)+1});
    setDrawOffer(null);
    setLog(l=>[`❌ ${names[myColor]} declined the draw.`,...l].slice(0,40));
  };
  const cancelDraw=async()=>{
    if(!online||drawOffer!=="sent")return;
    const r=await sget(`rooms/${roomCode}`);if(!r)return;
    await sset(`rooms/${roomCode}`,{...r,drawOffer:null,version:(r.version||0)+1});
    setDrawOffer(null);
  };

  // ── Chat actions ──────────────────────────────────────────────────────────
  const sendChat=async(text,type="text")=>{
    if(!online||!text.trim())return;
    const r=await sget(`rooms/${roomCode}`);if(!r)return;
    const msgs=r.chat||[];
    const msg={color:myColor,name:names[myColor]||myName,text:text.trim(),type,ts:Date.now()};
    await sset(`rooms/${roomCode}`,{...r,chat:[...msgs,msg],version:(r.version||0)+1});
    if(type==="text")setChatInput("");
  };
  const sendEmoji=async(emoji)=>{
    showFloatingEmoji(emoji);
    await sendChat(emoji,"emoji");
  };

  // ── Rematch actions ───────────────────────────────────────────────────────
  const offerRematch=async()=>{
    if(!online||rematchOffer)return;
    const r=await sget(`rooms/${roomCode}`);if(!r)return;
    await sset(`rooms/${roomCode}`,{...r,rematch:{by:myColor,status:"pending"},version:(r.version||0)+1});
    setRematchOffer("sent");
  };
  const acceptRematch=async()=>{
    if(!online||rematchOffer!=="received")return;
    const r=await sget(`rooms/${roomCode}`);if(!r)return;
    const newBoard=initBoard();
    await sset(`rooms/${roomCode}`,{...r,rematch:{...r.rematch,status:"accepted"},board:newBoard,current:"red",log:[`🔄 Rematch! ${r.names?.red||"Red"} vs ${r.names?.black||"Black"}.`],winner:null,capRed:0,capBlack:0,moveCount:0,drawOffer:null,chat:[],version:(r.version||0)+1});
    setRematchOffer(null);setBoard(newBoard);setCur("red");setWin(null);setLog([`🔄 Rematch!`]);setCapR(0);setCapB(0);setMoves(0);setLastMv(null);setPayoutShown(false);payoutDone.current=false;setChatMessages([]);
  };
  const declineRematch=async()=>{
    if(!online||rematchOffer!=="received")return;
    const r=await sget(`rooms/${roomCode}`);if(!r)return;
    await sset(`rooms/${roomCode}`,{...r,rematch:{...r.rematch,status:"declined"},version:(r.version||0)+1});
    setRematchOffer(null);
  };
  const cancelRematch=async()=>{
    if(!online||rematchOffer!=="sent")return;
    const r=await sget(`rooms/${roomCode}`);if(!r)return;
    await sset(`rooms/${roomCode}`,{...r,rematch:null,version:(r.version||0)+1});
    setRematchOffer(null);
  };

  const push=useCallback(async extra=>{
    if(!online)return;const r=await sget(`rooms/${roomCode}`);if(!r)return;
    const nv=(r.version||0)+1;ver.current=nv;await sset(`rooms/${roomCode}`,{...r,...extra,version:nv});
  },[online,roomCode]);

  const myTurn=isAI?(cur==="red"&&!aiThinking):myColor==="local"?true:cur===myColor;
  const tgts=new Set(valid.map(m=>`${m.to[0]}-${m.to[1]}`));
  const ctgts=new Set(valid.filter(m=>m.over).map(m=>`${m.to[0]}-${m.to[1]}`));
  const{red:rp,black:bp}=countP(board);

  const click=useCallback((r,c)=>{
    if(win||!myTurn)return;
    const ap=isAI?"red":(myColor==="local"?cur:myColor);
    const piece=board[r][c];
    // During a chain jump — only allow the chaining piece to move
    if(chain){
      const[cr,cc]=chain;
      // Click on the chaining piece itself — re-show its valid jumps
      if(r===cr&&c===cc){setSel([r,c]);setValid(getJumps(board,cr,cc,ap));return;}
      // Click on a valid jump target
      const mv=valid.find(m=>m.to[0]===r&&m.to[1]===c);
      if(mv){execMove(board,mv,ap);return;}
      // Any other click during chain is ignored
      return;
    }
    const hj=allJumps(board,ap).length>0;setMustJ(hj);
    if(belongs(piece,ap)){setSel([r,c]);setValid(hj?getJumps(board,r,c,ap):getMoves(board,r,c,ap));return;}
    if(sel){const mv=valid.find(m=>m.to[0]===r&&m.to[1]===c);if(mv){execMove(board,mv,ap);return;}}
    setSel(null);setValid([]);
  },[board,cur,myColor,isAI,myTurn,sel,valid,chain,win,execMove]);

  const reset=async()=>{
    const f={board:initBoard(),current:"red",log:[`New game! ${names.red} vs ${names.black}.`],winner:null,capRed:0,capBlack:0,moveCount:0};
    setBoard(f.board);setCur("red");setSel(null);setValid([]);setMustJ(false);setChain(null);
    setLog(f.log);setWin(null);setCapR(0);setCapB(0);setLastMv(null);setMoves(0);
    if(online&&roomCode){const r=await sget(`rooms/${roomCode}`);await sset(`rooms/${roomCode}`,{...f,version:(r?.version||0)+1});}
  };

  return(
    <div style={{position:"fixed",inset:0,background:"#0e0b08",display:"flex",flexDirection:"column",userSelect:"none",overflow:"hidden"}}>
      {/* Top bar */}
      <div style={{flexShrink:0,background:"#0f0c08",borderBottom:"1px solid #2a1808",padding:"10px 14px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <button onClick={onLeave} style={{background:"transparent",border:"1px solid #2a1808",color:"#5a4028",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:11,flexShrink:0}}>← {t.lobby}</button>
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:8,letterSpacing:4,color:"#2a1a08"}}>DRAFT PESA</div>
            <div style={{fontSize:18,color:GOLD,letterSpacing:3,fontWeight:"normal"}}>KARIBU TUZICHAPE</div>
          </div>
          {online&&<div style={{flexShrink:0}}><CoinDisplay coins={myCoins} size={11}/></div>}
          {!online&&<div style={{width:80,flexShrink:0}}/>}
        </div>
        <div style={{fontSize:9,color:"#3a2a14",textAlign:"center",marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",gap:6,flexWrap:"wrap"}}>
          {online&&<><span style={{color:"#4a6a38"}}>🏠 <strong style={{fontFamily:"monospace",color:"#6a8a50"}}>{roomCode}</strong></span><span>·</span><span style={{color:oppOnline?"#4a8a4a":"#7a4830"}}>{oppOnline?`${names[opp(myColor)]} ●`:"Waiting…"}</span><span>·</span><span style={{color:sync==="ok"?"#3a6a38":"#8a4a28"}}>{sync==="ok"?"✓ Live":"⟳"}</span></>}
          {isAI&&<span style={{color:"#8a7a48"}}>🤖 VS AI · <span style={{color:aiDiff==="easy"?"#4a9a4a":aiDiff==="hard"?"#9a4030":"#9a8030"}}>{(aiDiff||"medium").toUpperCase()}</span></span>}
          {!online&&!isAI&&<span>LOCAL 2-PLAYER</span>}
        </div>
      </div>

      {/* Status bar */}
      <div style={{flexShrink:0,height:32,display:"flex",alignItems:"center",justifyContent:"center",background:"#14100a",borderBottom:"1px solid #1a1208",position:"relative"}}>
        {/* Turn indicator */}
        {!win&&!drawOffer&&!(isAI&&aiThinking)&&(
          <div style={{padding:"4px 14px",background:cur==="red"?"rgba(140,30,10,.25)":"rgba(20,20,20,.7)",border:`1px solid ${cur==="red"?"#803010":"#2a2a2a"}`,borderRadius:16,fontSize:11,color:cur==="red"?"#c06050":"#999",display:"flex",alignItems:"center",gap:6}}>
            {cur==="red"?"🔴":"⚫"}<strong>{names[cur]}'s turn</strong>{isAI&&cur==="black"&&<span style={{fontSize:9,color:"#7a6ab0"}}> 🤖</span>}
            {mustJ&&!chain&&<span style={{color:"#c08820",fontSize:9}}>⚠ MUST CAPTURE</span>}
            {chain&&<span style={{color:"#f0c040",fontSize:9,fontWeight:"bold",animation:"pulse .7s ease-in-out infinite"}}>⚡ CHAIN!</span>}
          </div>
        )}
        {/* Your turn / waiting */}
        {online&&!win&&(
          <div style={{padding:"3px 12px",background:"rgba(212,168,75,0.04)",border:"1px solid #1a1208",borderRadius:16,fontSize:10,color:"#4a3a18",display:"flex",alignItems:"center",gap:5}}>
            You: <strong style={{color:myColor==="red"?"#e8614a":"#ccc"}}>{myColor==="red"?"🔴":"⚫"}</strong>
            <span style={{color:myTurn?"#4a7a28":"#2a1e0c",marginLeft:3}}>{myTurn?t.yourTurn:t.waiting}</span>
          </div>
        )}
        {/* AI thinking */}
        {isAI&&aiThinking&&!win&&(
          <div style={{padding:"4px 16px",background:"linear-gradient(135deg,rgba(44,32,90,.85),rgba(22,16,55,.9))",border:"1px solid #6a5aaa",borderRadius:16,fontSize:10,color:"#c4b4f4",display:"flex",alignItems:"center",gap:8,animation:"aibar 1.8s ease-in-out infinite"}}>
            <span style={{fontSize:14,animation:"thinkgear 1.4s ease-in-out infinite",display:"inline-block"}}>⚙️</span>
            <span style={{fontWeight:"bold",letterSpacing:1}}>AI THINKING</span>
            {[0,1,2].map(i=><span key={i} style={{width:5,height:5,borderRadius:"50%",background:"#b0a0f8",display:"inline-block",animation:`aidot 1.1s ease-in-out ${i*0.18}s infinite`}}/>)}
          </div>
        )}
        {/* Draw offer sent */}
        {online&&drawOffer==="sent"&&!win&&(
          <div style={{padding:"4px 14px",background:"rgba(60,70,20,.5)",border:"1px solid #4a5a20",borderRadius:16,fontSize:10,color:"#a0a840",display:"flex",alignItems:"center",gap:6}}>
            <span style={{animation:"pulse 1.2s ease-in-out infinite"}}>🤝</span>
            <span>Draw offered — waiting...</span>
            <button onClick={cancelDraw} style={{background:"transparent",border:"1px solid #5a5a20",color:"#707830",borderRadius:3,padding:"1px 6px",cursor:"pointer",fontSize:9}}>Cancel</button>
          </div>
        )}
        {/* Win banner */}
        {win&&win!=="draw"&&(
          <div style={{padding:"4px 16px",background:win==="red"?"rgba(140,30,10,.5)":"rgba(15,15,25,.9)",border:"2px solid #d4a84b",borderRadius:16,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:14}}>{win==="red"?"🔴":"⚫"} 👑</span>
            <span style={{fontSize:12,color:GOLD,letterSpacing:1,fontWeight:"bold"}}>{(names[win]||"").toUpperCase()} WINS!</span>
            <span style={{fontSize:9,color:"#666"}}>({moves} moves)</span>
            <Btn onClick={reset} style={{padding:"3px 8px",fontSize:9}}>🔄</Btn>
            {online&&<Btn variant="green" onClick={offerRematch} disabled={!!rematchOffer} style={{padding:"3px 8px",fontSize:9}}>⚔</Btn>}
          </div>
        )}
      </div>

      {/* Board — fills remaining space */}
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",overflow:"auto",padding:"8px"}}>
        <div style={{position:"relative"}}>
          <div style={{display:"flex",marginLeft:18,marginBottom:2}}>{["A","B","C","D","E","F","G","H"].map(l=><div key={l} style={{width:cs,textAlign:"center",fontSize:8,color:"#2a1a08"}}>{l}</div>)}</div>

            <div style={{display:"grid",gridTemplateColumns:`repeat(8,${cs}px)`,gridTemplateRows:`repeat(8,${cs}px)`,border:"3px solid #6b5020",boxShadow:"0 0 40px rgba(0,0,0,0.9)"}}>
              {board.map((row,r)=>row.map((piece,c)=>{
                const dk=(r+c)%2===1,isSel=sel&&sel[0]===r&&sel[1]===c;
                const isTgt=tgts.has(`${r}-${c}`),isCap=ctgts.has(`${r}-${c}`);
                const wasLast=lastMv&&((lastMv.from[0]===r&&lastMv.from[1]===c)||(lastMv.to[0]===r&&lastMv.to[1]===c));
                const isAILanding=isAI&&aiJustMoved&&lastMv&&lastMv.to[0]===r&&lastMv.to[1]===c;
                const isAIFrom=isAI&&aiJustMoved&&lastMv&&lastMv.from[0]===r&&lastMv.from[1]===c;
                const isChainPiece=chain&&chain[0]===r&&chain[1]===c;
                let bg=dk?"#2c1a0e":"#c4a882";
                if(dk){if(isSel)bg="#5c3a10";else if(isAILanding)bg="#2a1e4a";else if(isAIFrom)bg="#1e1830";else if(wasLast)bg="#3d2510";}
                return(
                  <div key={`${r}-${c}`} onClick={()=>dk&&click(r,c)}
                    style={{width:cs,height:cs,background:bg,display:"flex",alignItems:"center",justifyContent:"center",cursor:dk&&myTurn?"pointer":"default",position:"relative",transition:"background .5s ease",boxSizing:"border-box",
                    border:isSel?"2px solid #d4a84b":isAILanding?"2px solid #a090e8":isChainPiece?"2px solid #f0c040":"2px solid transparent",
                    animation:isAILanding?`ailand .7s ease-out forwards`:isChainPiece?"chainring 0.9s ease-in-out infinite":undefined}}>
                    {isTgt&&dk&&<div style={{position:"absolute",width:isCap?cs*0.33:cs*0.25,height:isCap?cs*0.33:cs*0.25,borderRadius:"50%",background:isCap?"rgba(240,100,30,0.75)":"rgba(212,168,75,0.6)",boxShadow:isCap?"0 0 10px rgba(240,100,30,0.7)":"none",pointerEvents:"none",zIndex:2}}/>}
                    {piece!==EMPTY&&<Piece type={piece} sel={!!isSel} cs={cs} aiLand={isAILanding}/>}
                  </div>
                );
              }))}
            </div>
          </div>
        </div>
      </div>

      {/* Info panel - horizontal layout below the board */}
      <div style={{flexShrink:0,display:"flex",gap:8,padding:"8px 12px",background:"#0f0c08",borderTop:"1px solid #2a1808",overflowX:"auto",overflowY:"hidden"}}>
        <div style={{display:"flex",flexDirection:"column",gap:8,minWidth:160,flex:1}}>
          <div style={{background:"#18120a",border:"1px solid #201408",borderRadius:6,padding:"8px 10px"}}>
            <div style={{fontSize:8,letterSpacing:3,color:"#2a1a08",marginBottom:6}}>PLAYERS</div>
            {[{col:"red",emoji:"🔴",pieces:rp,cap:capB,k:kings.red},{col:"black",emoji:"⚫",pieces:bp,cap:capR,k:kings.black}].map(p=>{
              const act=cur===p.col&&!win,me=online&&myColor===p.col;
              return(
                <div key={p.col} style={{marginBottom:5,padding:"6px 8px",background:act?"rgba(212,168,75,0.07)":"transparent",border:`1px solid ${act?"#4a3408":"#181008"}`,borderRadius:4}}>
                  <div style={{fontWeight:"bold",fontSize:11,marginBottom:2,color:act?GOLD:"#6a5a30"}}>
                    {p.emoji} {names[p.col]}{act?" ◀":""}{me&&<span style={{fontSize:8,color:"#3a7a3a"}}> (you)</span>}
                  </div>
                  <div style={{fontSize:9,color:"#4a3a18",display:"flex",gap:6}}>
                    <span>♟{p.pieces}</span><span>⚔{p.cap}</span>{p.k>0&&<span style={{color:GOLD}}>👑{p.k}</span>}
                  </div>
                </div>
              );
            })}
            <div style={{fontSize:8,color:"#2a1a08",textAlign:"right",marginTop:2}}>#{moves}</div>
            {betAmt>0&&<div style={{marginTop:6,padding:"6px 8px",background:"rgba(212,168,75,0.07)",border:"1px solid #3a2408",borderRadius:4,textAlign:"center"}}>
              <div style={{fontSize:9,color:"#7a5a18",marginBottom:1}}>POT</div>
              <CoinDisplay coins={betAmt*2} size={13}/>
            </div>}
          </div>
        </div>
        <div style={{minWidth:140,flex:1}}>
          <div style={{display:"flex",gap:5,marginBottom:8}}>
            <button onClick={reset} style={{flex:1,padding:"6px 8px",background:"#181008",color:"#b89030",border:"1px solid #281808",borderRadius:4,cursor:"pointer",fontSize:9}}>{t.new}</button>
            <button onClick={()=>setRules(x=>!x)} style={{flex:1,padding:"6px 8px",background:rules?"#201608":"#141008",color:"#6a5a28",border:"1px solid #181008",borderRadius:4,cursor:"pointer",fontSize:9}}>{t.rules}</button>
          </div>
          <div style={{display:"flex",gap:5}}>
            {online&&!win&&<button onClick={drawOffer==="sent"?cancelDraw:offerDraw} disabled={!!drawOffer&&drawOffer!=="sent"} style={{flex:1,padding:"6px 8px",background:drawOffer==="sent"?"#1a1a08":"#141008",color:drawOffer==="sent"?"#a0a030":"#5a6a28",border:`1px solid ${drawOffer==="sent"?"#3a3a10":"#181408"}`,borderRadius:4,cursor:"pointer",fontSize:9,opacity:drawOffer==="received"?0.4:1}}>🤝{drawOffer==="sent"?` ${t.cancel}`:t.draw}</button>}
            {online&&<button onClick={()=>{setChatOpen(x=>!x);setChatUnread(0);}} style={{flex:1,padding:"6px 8px",background:chatOpen?"rgba(200,120,60,0.25)":"#141008",color:"#c87840",border:`1px solid ${chatOpen?"#c87840":"#181408"}`,borderRadius:4,cursor:"pointer",fontSize:9,position:"relative"}}>
              {t.chat}{chatUnread>0&&<span style={{position:"absolute",top:-5,right:-5,background:"#c03020",color:"#fff",fontSize:8,borderRadius:"50%",width:15,height:15,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",lineHeight:1}}>{chatUnread}</span>}
            </button>}

        <div style={{minWidth:160,flex:1}}>
          <div style={{background:"#141008",border:"1px solid #181008",borderRadius:6,padding:"7px 9px",height:"100%"}}>
            <div style={{fontSize:8,letterSpacing:2,color:"#2a1a08",marginBottom:5}}>LOG</div>
            <div style={{maxHeight:80,overflowY:"auto",display:"flex",flexDirection:"column",gap:2}}>
              {log.map((e,i)=><div key={i} style={{fontSize:9,color:i===0?"#a87830":"#2a1a08",borderBottom:"1px solid #141008",paddingBottom:2,lineHeight:1.4}}>{e}</div>)}

        <div style={{color:GOLD,marginBottom:8,fontSize:12,letterSpacing:2}}>📜 RULES</div>
        {[["🎯 Win","Capture all pieces or leave opponent with no moves."],["➡ Move","Diagonal forward 1 square."],["⚡ Capture","Jump over enemy to empty square beyond."],["🔗 Multi-Jump","Continue if more jumps exist after capture."],["⚠ Mandatory","Must capture if any capture is available."],["👑 Flying King","Kings slide & jump any distance diagonally."],["🤝 Draw","Either player can offer a draw. Both must agree. Bets are refunded."],["🪙 Coins","Winner gets 90% of pot. 10% is the house cut."]].map(([t,d])=>(
          <div key={t} style={{marginBottom:6,display:"flex",gap:8}}>
            <div style={{minWidth:120,color:"#c8a040"}}>{t}</div>
            <div style={{color:"#5a4a20",lineHeight:1.5}}>{d}</div>
          </div>
        ))}
      </div>}

      {/* ── Chat panel — fixed overlay ── */}
      {online&&chatOpen&&(
        <div style={{position:"fixed",bottom:0,right:0,width:300,maxWidth:"95vw",height:380,background:"#141008",border:"1px solid #3a2010",borderRadius:"12px 12px 0 0",zIndex:900,display:"flex",flexDirection:"column",boxShadow:"0 -4px 30px rgba(0,0,0,0.8)",animation:"slidein .25s ease"}}>

        </div>
      )}

      {/* ── Rematch offer received popup ── */}
      {rematchOffer==="received"&&win&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,animation:"fadein .25s ease"}}>
          <div style={{background:CARD,border:"2px solid #4a7a3a",borderRadius:14,padding:"28px",maxWidth:300,width:"100%",textAlign:"center",animation:"slidein .3s ease"}}>
            <div style={{fontSize:44,marginBottom:8}}>🔄</div>
            <div style={{fontSize:18,fontWeight:"bold",color:"#a8d070",marginBottom:6,letterSpacing:1}}>{t.rematch}?</div>
            <div style={{fontSize:13,color:"#7a8a50",marginBottom:20,lineHeight:1.7}}>
              <strong style={{color:"#e8dcc8"}}>{names[opp(myColor)]}</strong> wants a rematch!
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <Btn variant="green" onClick={acceptRematch} style={{flex:1,padding:"11px 0",fontSize:13}}>✅ Accept</Btn>
              <Btn variant="danger" onClick={declineRematch} style={{flex:1,padding:"11px 0",fontSize:13}}>❌ Decline</Btn>
            </div>
          </div>
        </div>
      )}

      {/* ── Rematch declined toast ── */}
      {rematchDeclined&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"rgba(80,30,10,.95)",border:"1px solid #6a3010",borderRadius:10,padding:"10px 22px",fontSize:13,color:"#c06040",zIndex:999,animation:"slidein .3s ease",whiteSpace:"nowrap"}}>
          ❌ {t.rematch} declined
        </div>
      )}

      {/* ── Rematch offer sent toast ── */}
      {rematchOffer==="sent"&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"rgba(20,40,20,.95)",border:"1px solid #3a6030",borderRadius:10,padding:"10px 22px",fontSize:13,color:"#70c060",zIndex:999,display:"flex",alignItems:"center",gap:10,whiteSpace:"nowrap"}}>
          <span style={{animation:"pulse 1s infinite"}}>🔄</span> {t.waiting} {names[opp(myColor)]}…
          <button onClick={cancelRematch} style={{background:"transparent",border:"1px solid #3a5030",color:"#507040",borderRadius:5,padding:"2px 8px",cursor:"pointer",fontSize:11}}>{t.cancel}</button>
        </div>
      )}

      {/* Draw offer received popup */}
      {drawOffer==="received"&&!win&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,animation:"fadein .25s ease"}}>
          <div style={{background:CARD,border:"2px solid #5a7a3a",borderRadius:14,padding:"28px 28px",maxWidth:320,width:"100%",textAlign:"center",animation:"slidein .35s ease"}}>
            <div style={{fontSize:44,marginBottom:10}}>🤝</div>
            <div style={{fontSize:18,fontWeight:"bold",color:"#a8d070",marginBottom:6,letterSpacing:1}}>{t.draw.toUpperCase()} OFFERED</div>
            <div style={{fontSize:13,color:"#7a8a50",marginBottom:20,lineHeight:1.7}}>
              <strong style={{color:"#e8dcc8"}}>{names[opp(myColor)]}</strong> is offering a draw.<br/>
              {betAmt>0&&<span style={{color:"#c8a030",fontSize:12}}>Your bet of 🪙{fmtC(betAmt)} will be refunded.</span>}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <Btn variant="green" onClick={acceptDraw} style={{flex:1,padding:"11px 0",fontSize:13}}>✅ Accept</Btn>
              <Btn variant="danger" onClick={declineDraw} style={{flex:1,padding:"11px 0",fontSize:13}}>❌ Decline</Btn>
            </div>
          </div>
        </div>
      )}

      {/* Draw declined toast */}
      {drawResult==="declined"&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"rgba(80,30,10,.95)",border:"1px solid #6a3010",borderRadius:10,padding:"10px 22px",fontSize:13,color:"#c06040",zIndex:999,animation:"slidein .3s ease",whiteSpace:"nowrap"}}>
          ❌ {t.draw} declined
        </div>
      )}

      {/* Draw agreed modal */}
      {win==="draw"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:CARD,border:"2px solid #6a8a40",borderRadius:14,padding:"32px 28px",maxWidth:320,width:"100%",textAlign:"center",animation:"slidein .4s ease"}}>
            <div style={{fontSize:52,marginBottom:10}}>🤝</div>
            <div style={{fontSize:22,fontWeight:"bold",color:"#a8d070",marginBottom:6,letterSpacing:2}}>{t.draw.toUpperCase()}!</div>
            <div style={{fontSize:13,color:"#7a8a50",marginBottom:16,lineHeight:1.7}}>Both players agreed to a draw.<br/>The game ends with no winner.</div>
            {betAmt>0&&online&&(
              <div style={{padding:"8px 12px",background:"#141008",border:"1px solid #201408",borderRadius:8,marginBottom:16,fontSize:12}}>
                <div style={{color:"#6a8a30",marginBottom:4}}>🪙 Bets refunded to both players</div>
                <span style={{color:"#5a4a28"}}>Your balance: </span><CoinDisplay coins={myCoins}/>
              </div>
            )}
            <div style={{fontSize:11,color:"#3a3a18",marginBottom:20}}>{moves} moves played</div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <Btn onClick={()=>{setWin(null);setDrawResult(null);reset();}} style={{padding:"10px 16px",fontSize:12}}>{t.rematch}</Btn>
              <Btn variant="ghost" onClick={onLeave} style={{padding:"10px 16px",fontSize:12}}>{t.lobby}</Btn>
            </div>
          </div>
        </div>
      )}

      {/* Payout Popup */}
      {payoutShown&&betAmt>0&&win&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:CARD,border:`2px solid ${win===myColor?"#c8982a":"#4a2010"}`,borderRadius:14,padding:"32px 28px",maxWidth:320,width:"100%",textAlign:"center",animation:"slidein 0.4s ease"}}>
            <div style={{fontSize:52,marginBottom:10}}>{win===myColor?"🏆":"💀"}</div>
            <div style={{fontSize:22,fontWeight:"bold",color:win===myColor?"#7fffb2":"#c06040",marginBottom:6,letterSpacing:2}}>
              {win===myColor?"YOU WON!":"YOU LOST"}
            </div>
            {win===myColor?(
              <>
                <div style={{fontSize:28,color:GOLD,fontWeight:"bold",marginBottom:4}}>
                  +🪙{fmtC(Math.floor(betAmt*2*WIN_CUT))}
                </div>
                <div style={{fontSize:12,color:"#3a5a28",marginBottom:16}}>Coins added to your balance!</div>
              </>
            ):(
              <div style={{fontSize:13,color:"#7a4030",marginBottom:16}}>
                🪙{fmtC(betAmt)} deducted from balance
              </div>
            )}
            <div style={{padding:"8px 12px",background:"#141008",border:"1px solid #201408",borderRadius:8,marginBottom:20,fontSize:12}}>
              <span style={{color:"#5a4a28"}}>New balance: </span><CoinDisplay coins={myCoins}/>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <Btn onClick={()=>{setPayoutShown(false);onLeave();}} style={{padding:"10px 20px",fontSize:12}}>{t.lobby}</Btn>
              {online&&<Btn variant="green" onClick={()=>{setPayoutShown(false);offerRematch();}} disabled={!!rematchOffer} style={{padding:"10px 16px",fontSize:12}}>{t.rematch}</Btn>}
              <Btn variant="ghost" onClick={()=>setPayoutShown(false)} style={{padding:"10px 16px",fontSize:12}}>Continue</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

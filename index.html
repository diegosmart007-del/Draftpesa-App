// LEADERBOARD SCREEN
// ══════════════════════════════════════════════════════════════════════════
function LeaderboardScreen({myName,onBack}){
  const {t}=useLang();
  const [entries,setEntries]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sortBy,setSortBy]=useState("coins");

  const fetchLeaderboard=async()=>{
    setLoading(true);
    try{
      const users=await schildren("users");
      const rows=await Promise.all(users.map(async u=>{
        const coins=await getCoins(u.id);
        return{
          name:u.username||u.id,
          wins:u.wins||0,
          losses:u.losses||0,
          gamesPlayed:u.gamesPlayed||0,
          coins,
          winRate:u.gamesPlayed>0?Math.round((u.wins||0)/u.gamesPlayed*100):0,
        };
      }));
      rows.sort((a,b)=>b[sortBy]-a[sortBy]);
      setEntries(rows.slice(0,20));
    }catch(e){setEntries([]);}
    setLoading(false);
  };

  useEffect(()=>{fetchLeaderboard();},[sortBy]);

  const medals=["🥇","🥈","🥉"];
  const sortOpts=[
    {id:"coins",label:"🪙 Coins",col:e=><CoinDisplay coins={e.coins} size={13}/>},
    {id:"winRate",label:"📈 Win %",col:e=><span style={{fontSize:14,fontWeight:"bold",color:"#60c050"}}>{e.winRate}%</span>},
    {id:"gamesPlayed",label:"🎮 Games",col:e=><span style={{fontSize:14,fontWeight:"bold",color:"#6090c0"}}>{e.gamesPlayed}</span>},
  ];
  const activeSortOpt=sortOpts.find(o=>o.id===sortBy);

  return(
    <div style={{
      position:"fixed",inset:0,
      background:BG,
      display:"flex",
      flexDirection:"column",
      overflow:"hidden",
    }}>
      {/* ── Top bar ── */}
      <div style={{
        flexShrink:0,
        display:"flex",alignItems:"center",gap:12,
        padding:"14px 18px",
        background:"#0f0c08",
        borderBottom:"1px solid #2a1808",
      }}>
        <Btn variant="ghost" onClick={onBack} style={{padding:"6px 14px",fontSize:12,flexShrink:0}}>{t.back}</Btn>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:8,letterSpacing:6,color:"#3a2a14",marginBottom:1}}>DRAFT PESA</div>
          <div style={{fontSize:22,color:GOLD,letterSpacing:4,fontWeight:"normal",lineHeight:1}}>{t.leaderboard}</div>
        </div>
        <button onClick={fetchLeaderboard} title="Refresh"
          style={{background:"transparent",border:"1px solid #2a1808",color:"#5a4028",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:16,flexShrink:0,lineHeight:1}}>↻</button>
      </div>

      {/* ── Sort tabs ── */}
      <div style={{
        flexShrink:0,
        display:"flex",gap:8,
        padding:"10px 16px",
        background:"#0d0a06",
        borderBottom:"1px solid #1e1408",
      }}>
        {sortOpts.map(o=>(
          <button key={o.id} onClick={()=>setSortBy(o.id)}
            style={{flex:1,padding:"9px 6px",fontSize:12,fontWeight:"bold",
              background:sortBy===o.id?"rgba(212,168,75,0.18)":"#14100a",
              color:sortBy===o.id?GOLD:"#4a3a18",
              border:`1px solid ${sortBy===o.id?GOLD+"66":"#2a1808"}`,
              borderRadius:8,cursor:"pointer",transition:"all .15s"}}>
            {o.label}
          </button>
        ))}
      </div>

      {/* ── Column headers ── */}
      <div style={{
        flexShrink:0,
        display:"flex",alignItems:"center",gap:10,
        padding:"8px 18px",
        background:"#14100a",
        borderBottom:"1px solid #1e1408",
      }}>
        <div style={{width:32,fontSize:9,color:"#3a2a10",letterSpacing:2}}>#</div>
        <div style={{flex:1,fontSize:9,color:"#3a2a10",letterSpacing:2}}>{t.player}</div>
        <div style={{width:72,fontSize:9,color:"#3a2a10",letterSpacing:2,textAlign:"center"}}>W / L</div>
        <div style={{width:88,fontSize:9,color:GOLD,letterSpacing:2,textAlign:"right"}}>{activeSortOpt.label.split(" ").slice(1).join(" ").toUpperCase()}</div>
      </div>

      {/* ── Scrollable rows ── */}
      <div style={{flex:1,overflowY:"auto",overflowX:"hidden"}}>
        {loading?(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"#3a2a10"}}>
            <div style={{fontSize:32,animation:"spin 1s linear infinite",marginBottom:12}}>⚙</div>
            <div style={{fontSize:12,letterSpacing:2}}>LOADING…</div>
          </div>
        ):entries.length===0?(
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"#3a2a10",fontSize:13}}>No players found</div>
        ):(
          entries.map((e,i)=>{
            const isMe=e.name===myName;
            const medal=medals[i]||null;
            return(
              <div key={i} style={{
                display:"flex",alignItems:"center",gap:10,
                padding:"12px 18px",
                background:isMe?"rgba(212,168,75,0.07)":"transparent",
                borderBottom:"1px solid #180e06",
                borderLeft:isMe?`3px solid ${GOLD}`:"3px solid transparent",
                transition:"background .15s",
              }}
              onMouseEnter={ev=>ev.currentTarget.style.background=isMe?"rgba(212,168,75,0.13)":"rgba(255,255,255,0.025)"}
              onMouseLeave={ev=>ev.currentTarget.style.background=isMe?"rgba(212,168,75,0.07)":"transparent"}>
                {/* Rank */}
                <div style={{width:32,textAlign:"center",fontSize:medal?20:11,color:medal?"inherit":"#3a2a10",flexShrink:0,lineHeight:1}}>{medal||("#"+(i+1))}</div>
                {/* Avatar + name */}
                <div style={{flex:1,display:"flex",alignItems:"center",gap:10,minWidth:0}}>
                  <Avatar name={e.name} size={36}/>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:"bold",color:isMe?GOLD:"#c8b080",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                      {e.name}{isMe&&<span style={{fontSize:10,color:"#5a4020",marginLeft:5,fontWeight:"normal"}}>(you)</span>}
                    </div>
                    <div style={{fontSize:10,color:"#4a3a18",marginTop:2}}>
                      <span style={{color:"#3a7a30"}}>W{e.wins}</span>
                      <span style={{color:"#3a2a10",margin:"0 4px"}}>/</span>
                      <span style={{color:"#7a3a28"}}>L{e.losses}</span>
                    </div>
                  </div>
                </div>
                {/* W/L hidden on mobile — merged into name block above */}
                <div style={{width:72,textAlign:"center",fontSize:11,display:"none"}}/>
                {/* Primary stat */}
                <div style={{width:88,textAlign:"right",flexShrink:0}}>{activeSortOpt.col(e)}</div>
              </div>
            );
          })
        )}
      </div>

      {/* ── Footer ── */}
      <div style={{flexShrink:0,padding:"8px 16px",borderTop:"1px solid #1a1008",background:"#0d0a06",textAlign:"center",fontSize:10,color:"#2a1808"}}>
        Top 20 players · Sorted by {activeSortOpt.label}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// ROOT
// ══════════════════════════════════════════════════════════════════════════
function App(){
  const [session,setSession]=useState(null);
  const [screen,setScreen]=useState("auth");
  const [gp,setGp]=useState(null);
  
  const onAuth=s=>{setSession(s);setScreen("lobby");};
  const start=(roomCode,myColor,myName2,opName,betAmt=0,userId="guest",aiDiff=null)=>{setGp({roomCode,myColor,myName:myName2,opName,betAmt,userId,aiDiff});setScreen("game");};
  const back=()=>{setGp(null);setScreen("lobby");};
  const logout=()=>{try{localStorage.removeItem("dp_session");}catch{}setSession(null);setScreen("auth");};
  if(screen==="auth")return <AuthGate onDone={onAuth}/>;
  if(screen==="game"&&gp)return <Game {...gp} onLeave={back}/>;
  if(screen==="leaderboard")return <LeaderboardScreen myName={session?.username||"Player"} onBack={()=>setScreen("lobby")}/>;
  return <Lobby myName={session?.username||"Player"} onStartGame={start} onLogout={logout} session={session} onLeaderboard={()=>setScreen("leaderboard")}/>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<LangProvider><App/></LangProvider>);
</script>
</body>
</html>
